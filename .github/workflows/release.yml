name: Build and Release EXE

# Workflow sẽ được kích hoạt mỗi khi push một tag có định dạng bắt đầu bằng 'v' (ví dụ: v1.0, v1.0.1)
on:
  push:
    tags:
      - 'v*'

# Cấp quyền cho workflow để có thể tạo Release và tải file lên
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows EXE and Create Release
    runs-on: windows-latest # Chạy trên môi trường Windows để build ra file .exe chuẩn

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13' # Có thể đổi sang phiên bản Python đang dùng

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        # Sử dụng tham số --windowed để ẩn cửa sổ console terminal khi mở app Tkinter
        # Tham số --onefile giúp gom tất cả vào 1 file .exe duy nhất
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "PixivDownloader" main.py

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v3.0.0
        with:
          # Chỉ định đường dẫn tới file exe đã build thành công
          files: dist/PixivDownloader.exe
          # Tự động tạo note cho release dựa trên các commit
          generate_release_notes: true
